<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>太空飛船：隕城危機 3D (全螢幕範圍版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            z-index: 9999; justify-content: center; align-items: center;
            text-align: center; font-size: 24px; padding: 20px;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            z-index: 10;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        /* 底部控制區域佈局 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            pointer-events: auto;
            width: 100%;
        }
        
        /* 左側：D-pad 十字鍵 */
        .dpad-container {
            width: 150px;
            height: 150px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .dpad-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }
        .dpad-btn:active { background: rgba(255, 255, 255, 0.5); }
        
        #btn-up { top: 0; left: 50px; width: 50px; height: 60px; }
        #btn-down { bottom: 0; left: 50px; width: 50px; height: 60px; }
        #btn-left { top: 50px; left: 0; width: 60px; height: 50px; }
        #btn-right { top: 50px; right: 0; width: 60px; height: 50px; }

        /* 右側：獨立發射鍵 */
        #btn-fire {
            width: 110px;
            height: 110px;
            background: rgba(255, 50, 50, 0.4);
            border: 3px solid rgba(255, 100, 100, 0.8);
            border-radius: 50%;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.5);
            cursor: pointer;
        }
        #btn-fire:active { background: rgba(255, 100, 100, 0.7); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .menu-card {
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,191,255,0.5);
        }
        .menu-card h1 { margin-top: 0; color: #00bfff; }
        .start-btn {
            background: #00bfff; border: none; color: white;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 5px; cursor: pointer; margin-top: 15px;
            pointer-events: auto;
        }
        .leaderboard-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td {
            border-bottom: 1px solid #444;
            padding: 6px;
            font-size: 14px;
        }
        .leaderboard-table th { color: #00bfff; }
    </style>
