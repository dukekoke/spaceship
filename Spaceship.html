<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>太空飛船：隕城危機 3D (強制啟動版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            z-index: 9999; justify-content: center; align-items: center;
            text-align: center; font-size: 24px; padding: 20px;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            z-index: 10;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            pointer-events: auto;
            width: 100%;
        }
        
        /* 十字鍵 */
        .dpad-container {
            width: 150px;
            height: 150px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .dpad-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            cursor: pointer;
        }
        .dpad-btn:active { background: rgba(255, 255, 255, 0.5); }
        
        #btn-up { top: 0; left: 50px; width: 50px; height: 60px; }
        #btn-down { bottom: 0; left: 50px; width: 50px; height: 60px; }
        #btn-left { top: 50px; left: 0; width: 60px; height: 50px; }
        #btn-right { top: 50px; right: 0; width: 60px; height: 50px; }

        /* 發射鍵 */
        #btn-fire {
            width: 110px;
            height: 110px;
            background: rgba(255, 50, 50, 0.4);
            border: 3px solid rgba(255, 100, 100, 0.8);
            border-radius: 50%;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.5);
            cursor: pointer;
        }
        #btn-fire:active { background: rgba(255, 100, 100, 0.7); }

        /* 介面遮罩 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            pointer-events: auto; /* 開啟點擊 */
        }
        .menu-card {
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,191,255,0.5);
        }
        .menu-card h1 { margin-top: 0; color: #00bfff; }
        
        .start-btn {
            background: #00bfff; border: none; color: white;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 5px; cursor: pointer; margin-top: 15px;
            display: inline-block;
            transition: background 0.2s, transform 0.1s;
        }
        .start-btn:hover { background: #0099cc; transform: scale(1.05); }
        .start-btn:active { transform: scale(0.95); }

        .leaderboard-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td {
            border-bottom: 1px solid #444;
            padding: 6px;
            font-size: 14px;
        }
        .leaderboard-table th { color: #00bfff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="portrait-warning">請將手機旋轉為【橫屏】進行遊戲 🔄</div>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hud">
            <div id="hud-hp">HP: 100</div>
            <div id="hud-score">分數: 0</div>
        </div>
        <div class="controls">
            <div class="dpad-container">
                <div class="dpad-btn" id="btn-up">↑</div>
                <div class="dpad-btn" id="btn-down">↓</div>
                <div class="dpad-btn" id="btn-left">←</div>
                <div class="dpad-btn" id="btn-right">→</div>
            </div>
            <div id="btn-fire">發射</div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="menu-card">
            <h1>太空飛船：隕城危機 3D</h1>
            <p style="text-align: left; font-size: 14px; line-height: 1.6;">
               1. 左手【十字鍵】：控制飛船上下左右移動。<br>
               2. 【雙模翻轉】：支援手機左右傾斜（陀螺儀）。若無陀螺儀，飛船會隨移動方向自動傾斜。<br>
               3. 右手【紅色按鈕】：發射雷射。電腦可按 <strong>Enter</strong> 或 空白鍵 發射。<br>
               4. 穿過藍色<strong>「宇宙圈」</strong>可獲得 <strong>+100分</strong>！
            </p>
            <button class="start-btn" id="btn-start">進入太空</button>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay" style="display: none;">
        <div class="menu-card">
            <h1 style="color: #ff4d4d;">GAME OVER</h1>
            <p>本次得分: <span id="final-score" style="color:#fff; font-size:20px; font-weight:bold;">0</span></p>
            <h3>🏆 本地排行榜</h3>
            <table class="leaderboard-table">
                <thead>
                    <tr><th>名次</th><th>最高分數</th><th>日期</th></tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <button class="start-btn" id="btn-restart" style="background:#ff4d4d;">再試一次</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let spaceship, leftWing, rightWing;
        let starField;
        let obstacles = [];
        let particlesSystems = []; 
        let gameActive = false;
        
        let hp = 100;
        let baseSpeed = 45; 
        let score = 0; 
        let gameTime = 0;
        let spawnTimer = 0;
        let spawnInterval = 1000; 
        
        let moveSpeed = 15; 
        let boundsX = 12;
        let boundsY = 7;

        let targetRoll = 0;
        let currentRoll = 0;
        let hasGyro = false; 

        const inputState = { up: false, down: false, left: false, right: false };

        window.onload = function() {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208); 
            scene.fog = new THREE.FogExp2(0x020208, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 10); 
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 15, 10);
            scene.add(dirLight);

            createStarfield();
            createSpaceship();
            updateScreenBounds();

            window.addEventListener('resize', onWindowResize);
            setupControls();
        }

        function updateScreenBounds() {
            if (!camera) return;
            const distance = 10; 
            const vFOV = THREE.MathUtils.degToRad(camera.fov); 
            const visibleHeight = 2 * Math.tan(vFOV / 2) * distance;
            const visibleWidth = visibleHeight * camera.aspect;
            
            boundsX = (visibleWidth / 2) - 2.0; 
            boundsY = (visibleHeight / 2) - 1.2; 
            boundsY -= 0.5; 
        }

        function createSpaceship() {
            spaceship = new THREE.Group();

            const bodyGeo = new THREE.ConeGeometry(0.6, 3, 16);
            bodyGeo.rotateX(Math.PI / 2); 
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.5, roughness: 0.2 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            spaceship.add(bodyMesh);

            const wingGeo = new THREE.BoxGeometry(2.2, 0.15, 0.8);
            const wingMat = new THREE.MeshStandardMaterial({ color: 0x00bfff, roughness: 0.5 });
            leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-1.6, 0, 0); 
            spaceship.add(leftWing);

            rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(1.6, 0, 0); 
            spaceship.add(rightWing);

            spaceship.position.set(0, 0, 0);
            scene.add(spaceship);
        }

        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 800;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i<starCount*3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 300;     
                posArray[i+1] = (Math.random() - 0.5) * 200;   
                posArray[i+2] = (Math.random() - 0.5) * 400 - 200;  
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.6, color: 0xffffff });
            starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);
        }

        function spawnObject() {
            const rand = Math.random();
            let mesh;
            
            const x = (Math.random() - 0.5) * (boundsX * 4);  
            const y = (Math.random() - 0.5) * (boundsY * 4);  
            const z = -90; 

            if (rand < 0.70) {
                const sizeScale = 0.4 + Math.random() * 2.1; 
                const geo = new THREE.DodecahedronGeometry(sizeScale);
                const mat = new THREE.MeshStandardMaterial({ color: 0xcd853f, roughness: 0.9 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { 
                    type: 'asteroid', 
                    radius: sizeScale * 1.2, 
                    sizeType: sizeScale > 1.6 ? 'large' : (sizeScale < 0.8 ? 'small' : 'medium'), 
                    hit: false 
                };
            } else if (rand < 0.85) {
                const geo = new THREE.BoxGeometry(1.3, 1.3, 1.3);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { type: 'heal', radius: 1.3, hit: false };
            } else {
                const geo = new THREE.TorusGeometry(1.8, 0.15, 8, 24);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x003366 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { type: 'ring', radius: 2.0, hit: false };
            }

            mesh.position.set(x, y, z);
            mesh.userData.rotX = Math.random() * 0.05;
            mesh.userData.rotY = Math.random() * 0.05;

            scene.add(mesh);
            obstacles.push(mesh);
        }

        function createExplosion(position, colorHex, particleCount = 30) {
            const geo = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                posArray[i * 3] = position.x;
                posArray[i * 3 + 1] = position.y;
                posArray[i * 3 + 2] = position.z;

                const angle1 = Math.random() * Math.PI * 2;
                const angle2 = Math.random() * Math.PI;
                const speed = 5 + Math.random() * 12;

                velocities.push(new THREE.Vector3(
                    Math.sin(angle2) * Math.cos(angle1) * speed,
                    Math.sin(angle2) * Math.sin(angle1) * speed,
                    Math.cos(angle2) * speed
                ));
            }

            geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const mat = new THREE.PointsMaterial({
                size: 0.5,
                color: colorHex,
                transparent: true,
                opacity: 1.0,
                blending: THREE.AdditiveBlending 
            });

            const particleSystem = new THREE.Points(geo, mat);
            particleSystem.userData = { velocities: velocities, age: 0, maxAge: 0.6 };

            scene.add(particleSystem);
            particlesSystems.push(particleSystem);
        }

        let projectiles = [];
        const projectileSpeed = 120;
        
        function fireProjectile() {
            if(!gameActive) return;
            
            const geo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 8);
            geo.rotateX(Math.PI / 2); 
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const projectile = new THREE.Mesh(geo, mat);
            
            projectile.position.copy(spaceship.position);
            projectile.rotation.z = spaceship.rotation.z;
            
            scene.add(projectile);
            projectiles.push(projectile);
        }

        function setupControls() {
            const startBtn = document.getElementById('btn-start');
            const restartBtn = document.getElementById('btn-restart');

            // 綁定多重監聽事件，確保滑鼠與觸控完全不被阻擋
            ['click', 'touchstart', 'pointerdown'].forEach(evtType => {
                startBtn.addEventListener(evtType, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    requestOrientationPermission();
                }, { passive: false });

                restartBtn.addEventListener(evtType, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    restartGame();
                }, { passive: false });
            });

            const bindDpad = (id, direction) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); inputState[direction] = true; });
                btn.addEventListener('touchend', () => inputState[direction] = false);
                btn.addEventListener('mousedown', () => inputState[direction] = true);
                btn.addEventListener('mouseup', () => inputState[direction] = false);
            };

            bindDpad('btn-up', 'up');
            bindDpad('btn-down', 'down');
            bindDpad('btn-left', 'left');
            bindDpad('btn-right', 'right');

            const btnFire = document.getElementById('btn-fire');
            btnFire.addEventListener('touchstart', (e) => { e.preventDefault(); fireProjectile(); });
            btnFire.addEventListener('mousedown', () => fireProjectile());
            
            window.addEventListener('mousemove', (e) => {
                if(!gameActive || hasGyro) return; 
                let ratio = (e.clientX / window.innerWidth) * 2 - 1; 
                targetRoll = -ratio * (Math.PI / 2); 
            });

            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowUp' || e.key === 'w') inputState.up = true;
                if(e.key === 'ArrowDown' || e.key === 's') inputState.down = true;
                if(e.key === 'ArrowLeft' || e.key === 'a') inputState.left = true;
                if(e.key === 'ArrowRight' || e.key === 'd') inputState.right = true;
                if(e.key === ' ' || e.key === 'f' || e.key === 'Enter') {
                    e.preventDefault(); 
                    fireProjectile();
                }
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === 'ArrowUp' || e.key === 'w') inputState.up = false;
                if(e.key === 'ArrowDown' || e.key === 's') inputState.down = false;
                if(e.key === 'ArrowLeft' || e.key === 'a') inputState.left = false;
                if(e.key === 'ArrowRight' || e.key === 'd') inputState.right = false;
            });
        }

        // 強制解鎖權限請求
        function requestOrientationPermission() {
            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                            startGame();
                        })
                        .catch(err => {
                            console.log("iOS 陀螺儀請求遭拒，直接啟動遊戲。");
                            startGame();
                        });
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                    startGame();
                }
            } catch (e) {
                // 發生任何未知錯誤，一律強制進入遊戲
                startGame();
            }
        }

        function handleOrientation(event) {
            if (!gameActive) return;
            if (event && (event.beta !== null || event.gamma !== null)) {
                hasGyro = true; 
            } else {
                return;
            }

            let tilt = 0;
            if (window.orientation === 90) {
                tilt = event.beta; 
            } else if (window.orientation === -90) {
                tilt = -event.beta;
            } else {
                tilt = event.gamma; 
            }
            let ratio = tilt / 45;
            if(ratio > 1) ratio = 1;
            if(ratio < -1) ratio = -1;
            targetRoll = ratio * (Math.PI / 2);
        }

        function startGame() {
            // 隱藏選單
            document.getElementById('start-overlay').style.display = 'none';
            window.focus(); // 視窗主動聚焦，確保鍵盤能立刻接收指令
            
            gameActive = true;
            hp = 100;
            score = 0;
            gameTime = 0;
            spawnTimer = 0;
            spawnInterval = 1000;
            document.getElementById('hud-hp').innerText = `HP: ${hp}`;
            document.getElementById('hud-score').innerText = `分數: ${score}`;
            
            obstacles.forEach(obj => scene.remove(obj));
            obstacles = [];
            projectiles.forEach(obj => scene.remove(obj));
            projectiles = [];
            particlesSystems.forEach(obj => scene.remove(obj));
            particlesSystems = [];
            
            spaceship.position.set(0, 0, 0);
            targetRoll = 0;
            currentRoll = 0;
            spawnObject();
        }

        function restartGame() {
            document.getElementById('gameover-overlay').style.display = 'none';
            startGame();
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = Math.floor(score);
            saveLeaderboard(Math.floor(score));
            showLeaderboard();
            document.getElementById('gameover-overlay').style.display = 'flex';
        }

        function saveLeaderboard(finalScore) {
            let scores = JSON.parse(localStorage.getItem('space_game_scores')) || [];
            scores.push({ score: finalScore, date: new Date().toLocaleDateString() });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);
            localStorage.setItem('space_game_scores', JSON.stringify(scores));
        }

        function showLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('space_game_scores')) || [];
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            if(scores.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3">暫無資料</td></tr>`;
                return;
            }
            scores.forEach((item, index) => {
                tbody.innerHTML += `<tr><td>${index + 1}</td><td>${item.score}</td><td>${item.date}</td></tr>`;
            });
        }

        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            if (gameActive) {
                gameTime += delta;
                score += delta * 10; 
                document.getElementById('hud-score').innerText = `分數: ${Math.floor(score)}`;

                let moveX = 0; let moveY = 0;
                if (inputState.up) moveY += 1;
                if (inputState.down) moveY -= 1;
                if (inputState.left) moveX -= 1;
                if (inputState.right) moveX += 1;

                if (moveX !== 0 && moveY !== 0) { moveX *= 0.7071; moveY *= 0.7071; }

                spaceship.position.x += moveX * moveSpeed * delta;
                spaceship.position.y += moveY * moveSpeed * delta;

                spaceship.position.x = Math.max(-boundsX, Math.min(boundsX, spaceship.position.x));
                spaceship.position.y = Math.max(-boundsY, Math.min(boundsY, spaceship.position.y));

                if (!hasGyro) {
                    if (moveX !== 0) {
                        targetRoll = -moveX * (Math.PI / 3);
                    } else {
                        targetRoll *= 0.9; 
                    }
                }

                currentRoll += (targetRoll - currentRoll) * 0.12;
                spaceship.rotation.z = currentRoll;
                spaceship.rotation.y = currentRoll * 0.2; 

                spawnInterval = Math.max(200, 1000 - (gameTime * 15));

                starField.position.z += baseSpeed * delta;
                if (starField.position.z > 200) starField.position.z = 0;

                spawnTimer += delta * 1000;
                if (spawnTimer >= spawnInterval) {
                    spawnObject();
                    spawnTimer = 0;
                }

                // 子彈碰撞
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const projectile = projectiles[i];
                    projectile.position.z -= projectileSpeed * delta;

                    if (projectile.position.z < -100) {
                        scene.remove(projectile);
                        projectiles.splice(i, 1);
                        continue;
                    }

                    for (let j = obstacles.length - 1; j >= 0; j--) {
                        const obstacle = obstacles[j];
                        if (obstacle.userData.type === 'asteroid' && !obstacle.userData.hit) {
                            const dist = projectile.position.distanceTo(obstacle.position);
                            if (dist < obstacle.userData.radius) {
                                obstacle.userData.hit = true;
                                
                                let pCount = 20;
                                if (obstacle.userData.sizeType === 'large') pCount = 55;
                                if (obstacle.userData.sizeType === 'small') pCount = 12;

                                createExplosion(obstacle.position, 0xd2691e, pCount);
                                scene.remove(obstacle);
                                obstacles.splice(j, 1);
                                scene.remove(projectile);
                                projectiles.splice(i, 1);
                                break; 
                            }
                        }
                    }
                }

                // 機體碰撞
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obj = obstacles[i];
                    obj.position.z += baseSpeed * delta;

                    obj.rotation.x += obj.userData.rotX;
                    obj.rotation.y += obj.userData.rotY;

                    if (!obj.userData.hit && obj.position.z >= -1.5 && obj.position.z <= 1.5) {
                        const leftWingWorld = new THREE.Vector3();
                        const rightWingWorld = new THREE.Vector3();
                        leftWing.getWorldPosition(leftWingWorld);
                        rightWing.getWorldPosition(rightWingWorld);

                        const distToLeft = obj.position.distanceTo(leftWingWorld);
                        const distToRight = obj.position.distanceTo(rightWingWorld);
                        const distToBody = obj.position.distanceTo(spaceship.position);

                        if (distToLeft < obj.userData.radius || distToRight < obj.userData.radius || distToBody < obj.userData.radius * 0.7) {
                            obj.userData.hit = true;

                            if (obj.userData.type === 'asteroid') {
                                hp -= 25;
                                if (hp < 0) hp = 0;
                                document.getElementById('hud-hp').innerText = `HP: ${hp}`;
                                flashScreen('#ff3333');
                                createExplosion(obj.position, 0xff0000, 20);
                                if (hp <= 0) gameOver();
                            } else if (obj.userData.type === 'heal') {
                                hp = Math.min(100, hp + 20);
                                document.getElementById('hud-hp').innerText = `HP: ${hp}`;
                                flashScreen('#33ff33');
                                createExplosion(obj.position, 0x00ff00, 40);
                            } else if (obj.userData.type === 'ring') {
                                score += 100;
                                document.getElementById('hud-score').innerText = `分數: ${Math.floor(score)}`;
                                flashScreen('#00ffff');
                                createExplosion(obj.position, 0x00ffff, 25);
                            }

                            scene.remove(obj);
                            obstacles.splice(i, 1);
                            continue;
                        }
                    }

                    if (obj.position.z > 15) {
                        scene.remove(obj);
                        obstacles.splice(i, 1);
                    }
                }
            }

            // 粒子更新
            for (let i = particlesSystems.length - 1; i >= 0; i--) {
                const sys = particlesSystems[i];
                sys.userData.age += delta;

                const posAttr = sys.geometry.attributes.position;
                const vels = sys.userData.velocities;

                for (let j = 0; j < vels.length; j++) {
                    posAttr.array[j * 3] += vels[j].x * delta;
                    posAttr.array[j * 3 + 1] += vels[j].y * delta;
                    posAttr.array[j * 3 + 2] += vels[j].z * delta;
                }
                posAttr.needsUpdate = true;

                const lifeRatio = sys.userData.age / sys.userData.maxAge;
                sys.material.opacity = 1.0 - lifeRatio;
                sys.material.size = 0.5 * (1.0 - lifeRatio * 0.5);

                if (sys.userData.age >= sys.userData.maxAge) {
                    scene.remove(sys);
                    sys.geometry.dispose();
                    sys.material.dispose();
                    particlesSystems.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function flashScreen(color) {
            scene.background = new THREE.Color(color);
            setTimeout(() => {
                if(scene) scene.background = new THREE.Color(0x020208);
            }, 120);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateScreenBounds();
        }
    </script>
</body>
