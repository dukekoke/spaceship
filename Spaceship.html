
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>太空飛船：隕石危機 3D (修正版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex !important; }
        }
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            z-index: 9999; justify-content: center; align-items: center;
            text-align: center; font-size: 24px; padding: 20px;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            z-index: 10;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }
        .btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        .btn:active { background: rgba(255, 255, 255, 0.5); }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .menu-card {
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,191,255,0.5);
        }
        .menu-card h1 { margin-top: 0; color: #00bfff; }
        .start-btn {
            background: #00bfff; border: none; color: white;
            padding: 12px 30px; font-size: 18px; font-weight: bold;
            border-radius: 5px; cursor: pointer; margin-top: 15px;
            pointer-events: auto;
        }
        .leaderboard-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
        }
        .leaderboard-table th, .leaderboard-table td {
            border-bottom: 1px solid #444;
            padding: 6px;
            font-size: 14px;
        }
        .leaderboard-table th { color: #00bfff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="portrait-warning">請將手機旋轉為【橫屏】進行遊戲 🔄</div>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hud">
            <div id="hud-hp">HP: 100</div>
            <div id="hud-speed">速度: --</div>
            <div id="hud-score">分數: 0s</div>
        </div>
        <div class="controls">
            <div class="btn" id="btn-acc">油門 (加速)</div>
            <div class="btn" id="btn-dec">減速</div>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="menu-card">
            <h1>太空飛船：隕城危機 3D</h1>
            <p>手機操作：【左右傾斜】控制飛船旋轉避免撞擊。<br>電腦操作：可按【左右方向鍵】或在畫面上【左右滑動滑鼠】控制。</p>
            <button class="start-btn" id="btn-start">開始遊戲</button>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay" style="display: none;">
        <div class="menu-card">
            <h1 style="color: #ff4d4d;">GAME OVER</h1>
            <p>本次得分: <span id="final-score" style="color:#fff; font-size:20px; font-weight:bold;">0</span> 秒</p>
            <h3>🏆 本地排行榜</h3>
            <table class="leaderboard-table">
                <thead>
                    <tr><th>名次</th><th>存活時間 (秒)</th><th>日期</th></tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
            <button class="start-btn" id="btn-restart" style="background:#ff4d4d;">再試一次</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let spaceship, leftWing, rightWing;
        let starField;
        let obstacles = [];
        let gameActive = false;
        
        let hp = 100;
        let baseSpeed = 40; 
        let speedModifier = 1; 
        let gameTime = 0; 
        let spawnTimer = 0;
        let spawnInterval = 1200; 
        
        let targetRoll = 0; 
        let currentRoll = 0;

        // 網頁載入完成後再啟動，確保 Three.js 載入完畢
        window.onload = function() {
            init();
            animate();
        };

        function init() {
            // 1. 場景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208); // 改用深藍黑色背景確保看得到物件
            scene.fog = new THREE.FogExp2(0x020208, 0.01);

            // 2. 攝影機 (調整視角使其更容易看到後方)
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 10); 
            camera.lookAt(0, 0, -5);

            // 3. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. 強化燈光 (避免物件太暗看不到)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 15, 10);
            scene.add(dirLight);

            // 5. 建立星空、飛船
            createStarfield();
            createSpaceship();

            // 6. 事件監聽
            window.addEventListener('resize', onWindowResize);
            setupControls();
        }

        function createSpaceship() {
            spaceship = new THREE.Group();

            // 船身：改用亮黃色，並增加發光，確保絕對看的到
            const bodyGeo = new THREE.ConeGeometry(0.6, 3, 16);
            bodyGeo.rotateX(Math.PI / 2); // 導向前方
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.5, roughness: 0.2 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            spaceship.add(bodyMesh);

            // 左襟翼：亮藍色長方體
            const wingGeo = new THREE.BoxGeometry(2.2, 0.15, 0.8);
            const wingMat = new THREE.MeshStandardMaterial({ color: 0x00bfff, roughness: 0.5 });
            leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-1.6, 0, 0); 
            spaceship.add(leftWing);

            // 右襟翼
            rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(1.6, 0, 0); 
            spaceship.add(rightWing);

            // 將飛船放在 Z=0 的位置上
            spaceship.position.set(0, 0, 0);
            scene.add(spaceship);
        }

        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 600;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i<starCount*3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 200;     
                posArray[i+1] = (Math.random() - 0.5) * 200;   
                posArray[i+2] = (Math.random() - 0.5) * 400 - 200;  
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.6, color: 0xffffff });
            starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);
        }

        function spawnObject() {
            const isItem = Math.random() < 0.20; // 20% 機率是修理包
            let mesh;

            // 在前方 -85 單位處依圓周軌道隨機生成，讓物件更快進入視野
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 4.5; 
            const x = Math.sin(angle) * radius;
            const y = Math.cos(angle) * radius;
            const z = -85; 

            if (!isItem) {
                // 隕石：改用偏紅褐色的不規則立體，體積加大
                const geo = new THREE.DodecahedronGeometry(0.8 + Math.random()*0.6);
                const mat = new THREE.MeshStandardMaterial({ color: 0xcd853f, roughness: 0.9 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { type: 'asteroid', radius: 1.4, hit: false };
            } else {
                // 修理包：螢光綠色立方體
                const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
                const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00 });
                mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { type: 'heal', radius: 1.2, hit: false };
            }

            mesh.position.set(x, y, z);
            mesh.userData.rotX = Math.random() * 0.04;
            mesh.userData.rotY = Math.random() * 0.04;

            scene.add(mesh);
            obstacles.push(mesh);
        }

        function setupControls() {
            document.getElementById('btn-start').addEventListener('click', requestOrientationPermission);
            document.getElementById('btn-restart').addEventListener('click', restartGame);

            const btnAcc = document.getElementById('btn-acc');
            const btnDec = document.getElementById('btn-dec');

            btnAcc.addEventListener('touchstart', (e) => { e.preventDefault(); speedModifier = 1.8; });
            btnAcc.addEventListener('touchend', () => speedModifier = 1.0);
            btnDec.addEventListener('touchstart', (e) => { e.preventDefault(); speedModifier = 0.4; });
            btnDec.addEventListener('touchend', () => speedModifier = 1.0);
            
            // 電腦滑鼠/觸控滑動模擬機制：左右滑動畫面可直接旋轉飛船
            window.addEventListener('mousemove', (e) => {
                if(!gameActive) return;
                // 計算滑鼠在畫面水平位置的比例 (-1 到 1)
                let ratio = (e.clientX / window.innerWidth) * 2 - 1;
                targetRoll = -ratio * (Math.PI / 2); // 限制最大 90 度
            });

            // 鍵盤備用控制
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft') targetRoll = Math.PI / 2;
                if(e.key === 'ArrowRight') targetRoll = -Math.PI / 2;
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === 'ArrowLeft' || e.key === 'ArrowRight') targetRoll = 0;
            });
        }

        function requestOrientationPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                        startGame();
                    })
                    .catch(() => {
                        startGame();
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startGame();
            }
        }

        function handleOrientation(event) {
            if (!gameActive) return;
            let tilt = 0;
            if (window.orientation === 90) {
                tilt = event.beta; 
            } else if (window.orientation === -90) {
                tilt = -event.beta;
            } else {
                tilt = event.gamma; 
            }
            let ratio = tilt / 40;
            if(ratio > 1) ratio = 1;
            if(ratio < -1) ratio = -1;
            targetRoll = ratio * (Math.PI / 2);
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            gameActive = true;
            hp = 100;
            gameTime = 0;
            spawnTimer = 0;
            spawnInterval = 1200;
            document.getElementById('hud-hp').innerText = `HP: ${hp}`;
            
            // 清除舊物件
            obstacles.forEach(obj => scene.remove(obj));
            obstacles = [];
            
            // 立即先生成第一個物件
            spawnObject();
        }

        function restartGame() {
            document.getElementById('gameover-overlay').style.display = 'none';
            startGame();
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = Math.floor(gameTime);
            saveLeaderboard(Math.floor(gameTime));
            showLeaderboard();
            document.getElementById('gameover-overlay').style.display = 'flex';
        }

        function saveLeaderboard(score) {
            let scores = JSON.parse(localStorage.getItem('space_game_scores')) || [];
            scores.push({ score: score, date: new Date().toLocaleDateString() });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);
            localStorage.setItem('space_game_scores', JSON.stringify(scores));
        }

        function showLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('space_game_scores')) || [];
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            if(scores.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3">暫無資料</td></tr>`;
                return;
            }
            scores.forEach((item, index) => {
                tbody.innerHTML += `<tr><td>${index + 1}</td><td>${item.score}</td><td>${item.date}</td></tr>`;
            });
        }

        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            if (gameActive) {
                gameTime += delta;
                document.getElementById('hud-score').innerText = `分數: ${Math.floor(gameTime)}s`;

                // 隨時間增加生成頻率
                spawnInterval = Math.max(250, 1200 - (gameTime * 15));

                // 飛船平滑旋轉
                currentRoll += (targetRoll - currentRoll) * 0.15;
                spaceship.rotation.z = currentRoll;

                // 背景星空移動
                const currentSpeed = baseSpeed * speedModifier;
                document.getElementById('hud-speed').innerText = `速度: ${Math.round(currentSpeed)}`;
                
                starField.position.z += currentSpeed * delta;
                if (starField.position.z > 200) starField.position.z = 0;

                // 生成計時器
                spawnTimer += delta * 1000;
                if (spawnTimer >= spawnInterval) {
                    spawnObject();
                    spawnTimer = 0;
                }

                // 處理障礙物移動與碰撞
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obj = obstacles[i];
                    obj.position.z += currentSpeed * delta; // 物件往螢幕飛過來

                    obj.rotation.x += obj.userData.rotX;
                    obj.rotation.y += obj.userData.rotY;

                    // 當物件逼近飛船的 Z 軸範圍 (飛船在 Z=0，所以判定範圍設在 -1.5 到 1.5)
                    if (!obj.userData.hit && obj.position.z >= -1.5 && obj.position.z <= 1.5) {
                        
                        const leftWingWorld = new THREE.Vector3();
                        const rightWingWorld = new THREE.Vector3();
                        leftWing.getWorldPosition(leftWingWorld);
                        rightWing.getWorldPosition(rightWingWorld);

                        const distToLeft = obj.position.distanceTo(leftWingWorld);
                        const distToRight = obj.position.distanceTo(rightWingWorld);

                        if (distToLeft < obj.userData.radius || distToRight < obj.userData.radius) {
                            obj.userData.hit = true;

                            if (obj.userData.type === 'asteroid') {
                                hp -= 25;
                                if (hp < 0) hp = 0;
                                document.getElementById('hud-hp').innerText = `HP: ${hp}`;
                                flashScreen('#ff3333');
                                if (hp <= 0) gameOver();
                            } else if (obj.userData.type === 'heal') {
                                hp = Math.min(100, hp + 20);
                                document.getElementById('hud-hp').innerText = `HP: ${hp}`;
                                flashScreen('#33ff33');
                            }

                            scene.remove(obj);
                            obstacles.splice(i, 1);
                            continue;
                        }
                    }

                    // 超過相機後方則刪除
                    if (obj.position.z > 15) {
                        scene.remove(obj);
                        obstacles.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function flashScreen(color) {
            scene.background = new THREE.Color(color);
            setTimeout(() => {
                if(scene) scene.background = new THREE.Color(0x020208);
            }, 120);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
